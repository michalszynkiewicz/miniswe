name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref. On PRs this cancels prior runs when
# new commits land; on main it serialises by ref so noisy pushes don't pile up.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Belt-and-braces: keep network downloads bounded if a test misbehaves.
  CARGO_NET_RETRY: "2"

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry, index, and target/
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: lint

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: build + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Full backtraces on any panic (e.g. the LSP watchdog timeouts in
      # tests/e2e_lsp.rs).
      RUST_BACKTRACE: "full"
      # Let rust-analyzer log what it's doing. Our LSP transport captures
      # its stderr verbatim via `[lsp:stderr] …` lines, so this surfaces
      # in the cargo test output and makes any LSP hang diagnosable.
      RA_LOG: "info"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry, index, and target/
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: test

      # rust-analyzer is auto-downloaded by the LSP tests into
      # ~/.miniswe/lsp-servers/. Cache it so we don't re-pull ~30MB every run.
      # Key includes an ISO week so a stale or corrupted cache evicts itself
      # within at most 7 days without needing a manual key bump.
      - name: Compute LSP cache epoch
        id: lsp-cache-epoch
        run: echo "week=$(date +%G-%V)" >> "$GITHUB_OUTPUT"

      - name: Cache LSP servers (rust-analyzer)
        uses: actions/cache@v4
        with:
          path: ~/.miniswe/lsp-servers
          key: lsp-servers-${{ runner.os }}-${{ steps.lsp-cache-epoch.outputs.week }}
          restore-keys: |
            lsp-servers-${{ runner.os }}-

      - name: cargo build
        run: cargo build --locked --all-targets

      - name: cargo test
        # `--nocapture` surfaces eprintln! breadcrumbs (e.g. `[trace]` lines
        # in tests/e2e_lsp.rs) in-flight, so hangs are diagnosable from the
        # workflow log rather than only on failure.
        # (`--report-time` would also be handy here but is nightly-only —
        # available via cargo-nextest if we want per-test timing later.)
        run: cargo test --locked -- --nocapture

  check-all-languages:
    name: cargo check --features all-languages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry, index, and target/
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: check-all-languages

      # Validate that the optional language features still compile. `cargo
      # check` is enough to catch breakage in the tree-sitter-* dependency
      # graph without paying for a full build of all ~18 grammars.
      - name: cargo check --features all-languages
        run: cargo check --locked --features all-languages
