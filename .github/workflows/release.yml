name: Release

on:
  release:
    types: [created]

permissions:
  contents: write  # required to create releases and upload assets

# Don't cancel a release in flight, but don't let two releases for the same
# tag race either.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      # Build all platforms in parallel for faster release cycles.
      matrix:
        include:
          # Linux x86_64 — static musl binary, runs on any Linux
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use_cross: true

          # macOS x86_64 — explicit target on ARM runner
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false

          # macOS aarch64 (Apple Silicon) — native on ARM runner
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux musl)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked --features all-languages --target ${{ matrix.target }}
          else
            cargo build --release --locked --features all-languages --target ${{ matrix.target }}
          fi

      - name: Strip binary
        shell: bash
        run: |
          BIN="target/${{ matrix.target }}/release/miniswe"
          if [ -f "$BIN" ]; then strip "$BIN"; fi

      - name: Package tarball + checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          name="miniswe-${{ github.ref_name }}-${{ matrix.target }}"
          tar -czf "dist/${name}.tar.gz" \
            -C "target/${{ matrix.target }}/release" miniswe
          ( cd dist && sha256sum "${name}.tar.gz" > "${name}.tar.gz.sha256" )
          ls -lh dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: miniswe-${{ matrix.name }}
          path: dist/*
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find all-artifacts -type f \( -name "*.tar.gz" -o -name "*.sha256" \) \
            -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -lh release-assets/

      # Split create + upload so a re-run after a partial failure (release
      # created, asset upload died) can still finish.
      - name: Create GitHub release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if ! gh release view "${{ github.ref_name }}" \
                 --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --title "${{ github.ref_name }}" \
              --generate-notes \
              --verify-tag
          fi
          gh release upload "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --clobber \
            release-assets/*
