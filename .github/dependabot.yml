version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Group churn-heavy dependency families into single PRs so we don't drown
    # in 18 separate tree-sitter-* updates every time tree-sitter ships.
    groups:
      tree-sitter:
        patterns:
          - "tree-sitter*"
      tokio:
        patterns:
          - "tokio*"
      serde:
        patterns:
          - "serde*"
      patch-and-minor:
        update-types:
          - "patch"
          - "minor"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
